<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Bombers Fastpitch Logo</title>
  <desc id="desc">Circular Bombers Fastpitch logo with blue ring, black star, and white B.</desc>
  <defs>
    <radialGradient id="blueGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#8fd0ff"/>
      <stop offset="52%" stop-color="#5baee0"/>
      <stop offset="100%" stop-color="#2f7fb6"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <path id="topArc" d="M86 260a170 170 0 0 1 340 0"/>
    <path id="bottomArc" d="M426 252a170 170 0 0 1-340 0"/>
  </defs>

  <rect width="512" height="512" fill="#02040A"/>
  <circle cx="256" cy="256" r="220" fill="url(#blueGlow)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="201" fill="none" stroke="#02040A" stroke-width="18"/>
  <circle cx="256" cy="256" r="151" fill="none" stroke="#02040A" stroke-width="11"/>
  <circle cx="256" cy="256" r="142" fill="#EAF6FF" opacity="0.10"/>

  <text font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="900" letter-spacing="16" fill="#02040A">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BOMBERS</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="43" font-weight="900" letter-spacing="14" fill="#02040A">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">FASTPITCH</textPath>
  </text>

  <g transform="translate(256 264)">
    <path d="M0-155 45-50 160-50 68 20 100 132 0 68-100 132-68 20-160-50-45-50Z" fill="#02040A"/>
    <path d="M0-124 35-42 124-42 53 14 77 100 0 52-77 100-53 14-124-42-35-42Z" fill="#FFFFFF"/>
    <path d="M0-98 27-32 96-32 41 10 60 76 0 40-60 76-41 10-96-32-27-32Z" fill="#02040A"/>
    <path d="M0-75 20-24 74-24 31 8 46 58 0 31-46 58-31 8-74-24-20-24Z" fill="#FFFFFF"/>
  </g>

  <text x="256" y="312" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="172" font-weight="900" fill="#FFFFFF" stroke="#02040A" stroke-width="17" paint-order="stroke fill">B</text>
</svg>
